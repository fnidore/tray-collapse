# 推 v* 标签时自动打包 zip + deb 并发布 GitHub Release
# 用法：git tag v1 && git push origin v1
name: Release

on:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: 安装打包依赖
        run: sudo apt-get update && sudo apt-get install -y libglib2.0-bin zip

      - name: 打包 zip + deb
        run: make pack deb

      - name: 发布 Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            dist/*.zip
            dist/*.deb
